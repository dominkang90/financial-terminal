services:
  - type: web
    name: finterminal-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips '*'
    rootDir: backend
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./financial_terminal.db
      - key: CORS_ORIGINS
        value: '["https://financial-terminal-psi.vercel.app","https://*.vercel.app","https://financial-terminal-p909.onrender.com"]'
      - key: DEBUG
        value: "false"
      - key: OAUTH_REDIRECT_BASE_URL
        value: "https://financial-terminal-p909.onrender.com"
      # 아래는 Render 대시보드 Environment에서 직접 입력하세요 (보안)
      # - key: GEMINI_API_KEY
      # - key: FINNHUB_API_KEY
      # - key: GOOGLE_CLIENT_ID
      # - key: GOOGLE_CLIENT_SECRET
      # - key: KAKAO_CLIENT_ID
      # - key: KAKAO_CLIENT_SECRET
